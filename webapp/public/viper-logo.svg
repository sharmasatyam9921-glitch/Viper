<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Dark background -->
  <rect width="120" height="120" rx="20" fill="#06090f"/>
  <rect x="1.5" y="1.5" width="117" height="117" rx="18.5" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Snake body - coiled S-curve -->
  <path d="M60 18 C80 18, 95 30, 95 45 C95 55, 85 62, 75 58 C65 54, 60 60, 60 68 C60 76, 65 82, 75 82 C85 82, 92 75, 92 65"
        stroke="#10b981" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Snake head (triangle pointing right) -->
  <path d="M88 60 L100 65 L88 70 Z" fill="#10b981"/>

  <!-- Snake eye -->
  <circle cx="94" cy="63" r="2" fill="#22d3ee"/>

  <!-- Forked tongue -->
  <line x1="100" y1="65" x2="108" y2="62" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="65" x2="108" y2="68" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Snake tail (thin, curled) -->
  <path d="M60 18 C45 18, 30 28, 28 40 C26 50, 32 55, 38 50 C42 46, 38 40, 34 42"
        stroke="#10b981" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Scale pattern dots -->
  <circle cx="70" cy="44" r="1.5" fill="#22d3ee" opacity="0.4"/>
  <circle cx="80" cy="50" r="1.5" fill="#22d3ee" opacity="0.4"/>
  <circle cx="68" cy="65" r="1.5" fill="#22d3ee" opacity="0.4"/>
  <circle cx="72" cy="76" r="1.5" fill="#22d3ee" opacity="0.4"/>
  <circle cx="82" cy="78" r="1.5" fill="#22d3ee" opacity="0.4"/>
</svg>
