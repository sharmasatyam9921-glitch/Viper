<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIPER 4.0 — AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #1c2333; --bg4: #21262d;
  --text: #c9d1d9; --text2: #8b949e; --muted: #6e7681;
  --border: rgba(48,54,61,0.6); --accent: #6366f1; --accent2: #818cf8;
  --critical: #ff4444; --high: #ff8c00; --medium: #ffd700;
  --low: #4da6ff; --info: #888; --success: #00c853; --danger: #ef4444;
  --font: 'Inter', system-ui, sans-serif; --mono: 'JetBrains Mono', monospace;
}
body { background: var(--bg); color: var(--text); font-family: var(--font);
  display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Nav ── */
.nav { display: flex; align-items: center; gap: 8px; padding: 8px 16px;
  background: var(--bg2); border-bottom: 1px solid var(--border); height: 48px; flex-shrink: 0; }
.nav a { color: var(--text2); text-decoration: none; font-size: 13px; padding: 4px 10px;
  border-radius: 6px; transition: all .2s; }
.nav a:hover, .nav a.active { color: var(--text); background: rgba(99,102,241,.12); }
.nav .brand { color: var(--accent2); font-weight: 700; font-size: 15px; margin-right: 12px; }
.nav .spacer { flex: 1; }
.nav .status { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
.ws-dot { width: 8px; height: 8px; border-radius: 50%; }
.ws-dot.connected { background: var(--success); }
.ws-dot.disconnected { background: var(--danger); }

/* ── Chat area ── */
.chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

/* ── Message bubbles ── */
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
.msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border);
  border-bottom-left-radius: 4px; }
.msg pre { background: var(--bg); padding: 8px; border-radius: 6px; margin-top: 8px;
  font-family: var(--mono); font-size: 12px; overflow-x: auto; white-space: pre-wrap; }
.msg code { font-family: var(--mono); font-size: 12px; background: rgba(0,0,0,.3); padding: 1px 4px; border-radius: 3px; }

/* ── Phase badge ── */
.phase-badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px;
  font-weight: 600; background: var(--accent); color: #fff; margin-bottom: 6px; }

/* ── Thinking indicator ── */
.thinking { align-self: flex-start; display: flex; align-items: center; gap: 8px; padding: 8px 16px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; font-size: 13px;
  color: var(--text2); }
.thinking .dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent2); margin: 0 2px; animation: dot-bounce 1.4s infinite ease-in-out; }
.thinking .dots span:nth-child(2) { animation-delay: 0.16s; }
.thinking .dots span:nth-child(3) { animation-delay: 0.32s; }
@keyframes dot-bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; } }

/* ── Tool execution card ── */
.tool-card { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; max-width: 80%; }
.tool-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  background: var(--bg4); cursor: pointer; font-size: 13px; }
.tool-header .tool-icon { font-size: 14px; }
.tool-header .tool-name { font-family: var(--mono); font-weight: 600; color: var(--accent2); }
.tool-header .tool-status { margin-left: auto; font-size: 11px; }
.tool-header .tool-status.success { color: var(--success); }
.tool-header .tool-status.running { color: var(--medium); }
.tool-header .tool-status.failed { color: var(--danger); }
.tool-body { padding: 10px 12px; font-size: 12px; display: none; border-top: 1px solid var(--border); }
.tool-body.open { display: block; }
.tool-body pre { background: var(--bg); padding: 8px; border-radius: 6px;
  font-family: var(--mono); white-space: pre-wrap; max-height: 200px; overflow-y: auto; }

/* ── Finding card ── */
.finding-card { align-self: flex-start; background: var(--bg3); border-left: 3px solid var(--danger);
  border-radius: 0 10px 10px 0; padding: 10px 14px; max-width: 80%; }
.finding-card.critical { border-left-color: var(--critical); }
.finding-card.high { border-left-color: var(--high); }
.finding-card.medium { border-left-color: var(--medium); }
.finding-card.low { border-left-color: var(--low); }
.finding-card .sev-badge { display: inline-block; padding: 1px 8px; border-radius: 6px;
  font-size: 10px; font-weight: 700; text-transform: uppercase; color: #fff; margin-bottom: 4px; }
.finding-card .sev-badge.critical { background: var(--critical); }
.finding-card .sev-badge.high { background: var(--high); }
.finding-card .sev-badge.medium { background: var(--medium); color: #000; }
.finding-card .sev-badge.low { background: var(--low); }
.finding-card .title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
.finding-card .url { font-size: 11px; color: var(--text2); font-family: var(--mono); word-break: break-all; }

/* ── Deep Think ── */
.deep-think { align-self: flex-start; background: var(--bg3); border: 1px solid rgba(99,102,241,.3);
  border-radius: 10px; max-width: 85%; overflow: hidden; }
.deep-think-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  background: rgba(99,102,241,.08); cursor: pointer; font-size: 13px; color: var(--accent2); }
.deep-think-body { padding: 10px 12px; font-size: 12px; display: none; border-top: 1px solid var(--border);
  color: var(--text2); line-height: 1.6; max-height: 300px; overflow-y: auto; }
.deep-think-body.open { display: block; }

/* ── Approval request ── */
.approval { align-self: flex-start; background: var(--bg3); border: 1px solid var(--medium);
  border-radius: 10px; padding: 14px; max-width: 80%; }
.approval .prompt { font-size: 13px; margin-bottom: 10px; }
.approval .actions { display: flex; gap: 8px; }
.approval button { border: none; padding: 6px 16px; border-radius: 6px; font-size: 13px;
  cursor: pointer; font-weight: 600; transition: .2s; }
.approval .btn-approve { background: var(--success); color: #fff; }
.approval .btn-modify { background: var(--medium); color: #000; }
.approval .btn-abort { background: var(--danger); color: #fff; }
.approval button:hover { filter: brightness(1.15); }

/* ── Input area ── */
.input-area { padding: 12px 16px; background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; gap: 8px; flex-shrink: 0; }
.input-area input { flex: 1; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 10px 14px; border-radius: 10px; font-size: 14px;
  font-family: var(--font); outline: none; }
.input-area input:focus { border-color: var(--accent); }
.input-area button { background: var(--accent); color: #fff; border: none; padding: 10px 20px;
  border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: .2s; }
.input-area button:hover { filter: brightness(1.15); }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<nav class="nav">
  <span class="brand">VIPER 4.0</span>
  <a href="index.html">Dashboard</a>
  <a href="graph_viz.html">Graph</a>
  <a href="charts.html">Analytics</a>
  <a href="chat.html" class="active">Chat</a>
  <a href="terminal.html">Terminal</a>
  <a href="settings_ui.html">Settings</a>
  <div class="spacer"></div>
  <div class="status">
    <span class="ws-dot disconnected" id="ws-dot"></span>
    <span id="ws-status">Disconnected</span>
  </div>
</nav>

<div class="chat-container">
  <div class="messages" id="messages">
    <div class="msg assistant">
      Welcome to VIPER 4.0 AI Chat. I'm connected to the orchestrator and can help you run scans,
      analyze findings, and explore the attack graph. Type a message or a target URL to begin.
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="msg-input" placeholder="Enter a message or target URL..."
      autocomplete="off" autofocus>
    <button id="btn-send">Send</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("msg-input");
const sendBtn = document.getElementById("btn-send");
const wsDot = document.getElementById("ws-dot");
const wsStatusEl = document.getElementById("ws-status");

let ws = null;
let reconnectTimer = null;
const WS_URL = `ws://${location.hostname || "localhost"}:8081`;
const SSE_URL = "/api/stream";

// ── Helpers ──
function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function addMessage(type, html) {
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.innerHTML = html;
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function addThinking() {
  const div = document.createElement("div");
  div.className = "thinking";
  div.id = "thinking-indicator";
  div.innerHTML = '<div class="dots"><span></span><span></span><span></span></div> Thinking...';
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function removeThinking() {
  const el = document.getElementById("thinking-indicator");
  if (el) el.remove();
}

function addToolCard(toolName, args, status="running") {
  const id = "tool-" + Date.now();
  const div = document.createElement("div");
  div.className = "tool-card";
  div.id = id;
  div.innerHTML = `
    <div class="tool-header" onclick="this.nextElementSibling.classList.toggle('open')">
      <span class="tool-icon">&#9881;</span>
      <span class="tool-name">${escapeHtml(toolName)}</span>
      <span class="tool-status ${status}">${status}</span>
    </div>
    <div class="tool-body">
      <pre>${escapeHtml(typeof args === "object" ? JSON.stringify(args, null, 2) : String(args || ""))}</pre>
    </div>`;
  messagesEl.appendChild(div);
  scrollBottom();
  return id;
}

function updateToolCard(id, output, success) {
  const card = document.getElementById(id);
  if (!card) return;
  const statusEl = card.querySelector(".tool-status");
  statusEl.textContent = success ? "done" : "failed";
  statusEl.className = `tool-status ${success ? "success" : "failed"}`;
  const body = card.querySelector(".tool-body");
  body.innerHTML += `<pre>${escapeHtml(String(output || "").substring(0, 2000))}</pre>`;
}

function addFinding(severity, title, url) {
  const sev = (severity || "info").toLowerCase();
  const div = document.createElement("div");
  div.className = `finding-card ${sev}`;
  div.innerHTML = `
    <span class="sev-badge ${sev}">${sev}</span>
    <div class="title">${escapeHtml(title || "Finding")}</div>
    ${url ? `<div class="url">${escapeHtml(url)}</div>` : ""}`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function addDeepThink(content) {
  const div = document.createElement("div");
  div.className = "deep-think";
  div.innerHTML = `
    <div class="deep-think-header" onclick="this.nextElementSibling.classList.toggle('open')">
      &#9733; Deep Think Analysis <span style="margin-left:auto;font-size:11px;color:var(--muted)">(click to expand)</span>
    </div>
    <div class="deep-think-body">${escapeHtml(content)}</div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function addPhaseBadge(phase) {
  const div = document.createElement("div");
  div.innerHTML = `<span class="phase-badge">${escapeHtml(phase)}</span>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function addApproval(prompt, approvalId) {
  const div = document.createElement("div");
  div.className = "approval";
  div.id = `approval-${approvalId}`;
  div.innerHTML = `
    <div class="prompt">${escapeHtml(prompt)}</div>
    <div class="actions">
      <button class="btn-approve" onclick="respondApproval('${approvalId}','approve')">Approve</button>
      <button class="btn-modify" onclick="respondApproval('${approvalId}','modify')">Modify</button>
      <button class="btn-abort" onclick="respondApproval('${approvalId}','abort')">Abort</button>
    </div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function respondApproval(id, action) {
  const el = document.getElementById(`approval-${id}`);
  if (el) {
    el.querySelector(".actions").innerHTML = `<span style="color:var(--text2);font-size:12px">Response: ${action}</span>`;
  }
  sendWS({ action: "approval_response", approval_id: id, decision: action });
}

// ── WebSocket connection ──
let toolCardMap = {};

function connectWS() {
  try {
    ws = new WebSocket(WS_URL);
  } catch (e) {
    console.warn("WebSocket not available, falling back to SSE");
    connectSSE();
    return;
  }

  ws.onopen = () => {
    wsDot.className = "ws-dot connected";
    wsStatusEl.textContent = "Connected (WS)";
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onclose = () => {
    wsDot.className = "ws-dot disconnected";
    wsStatusEl.textContent = "Disconnected";
    reconnectTimer = setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    ws.close();
    // Try SSE fallback
    connectSSE();
  };

  ws.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      handleEvent(msg.type || msg.event, msg.payload || msg.data || msg);
    } catch (e) {}
  };
}

function connectSSE() {
  try {
    const es = new EventSource(SSE_URL);
    es.onopen = () => {
      wsDot.className = "ws-dot connected";
      wsStatusEl.textContent = "Connected (SSE)";
    };
    es.onerror = () => {
      wsDot.className = "ws-dot disconnected";
      wsStatusEl.textContent = "SSE Error";
    };
    es.onmessage = (evt) => {
      try {
        const data = JSON.parse(evt.data);
        handleEvent(data.type || data.event, data.payload || data.data || data);
      } catch (e) {}
    };
    // Named events
    ["thinking","tool_start","tool_complete","finding","phase_update","scan_progress","chain_update"].forEach(t => {
      es.addEventListener(t, (evt) => {
        try { handleEvent(t, JSON.parse(evt.data)); } catch(e) {}
      });
    });
  } catch (e) {
    console.error("SSE fallback failed:", e);
  }
}

function handleEvent(type, data) {
  switch (type) {
    case "thinking":
      removeThinking();
      if (data.thought) {
        addThinking();
        const el = document.getElementById("thinking-indicator");
        if (el) el.innerHTML = `<div class="dots"><span></span><span></span><span></span></div> ${escapeHtml(data.thought.substring(0, 200))}`;
      }
      break;

    case "tool_start":
      removeThinking();
      const tid = addToolCard(data.tool_name, data.tool_args, "running");
      toolCardMap[data.tool_name] = tid;
      break;

    case "tool_complete":
      const cardId = toolCardMap[data.tool_name];
      if (cardId) updateToolCard(cardId, data.output, data.success);
      break;

    case "finding":
      addFinding(data.severity, data.title || data.type, data.url);
      break;

    case "phase_update":
      addPhaseBadge(`Phase: ${data.phase} | Iteration: ${data.iteration || 0}`);
      break;

    case "scan_progress":
      // Could update a progress bar; for now log it
      break;

    case "chain_update":
      addMessage("assistant", `<strong>Attack Chain ${escapeHtml(data.chain_id || "")}</strong>: ${(data.steps||[]).length} steps, ${(data.findings||[]).length} findings`);
      break;

    case "deep_think":
      addDeepThink(data.content || data.thought || "");
      break;

    case "approval_request":
      addApproval(data.prompt || data.message || "Approval needed", data.id || Date.now());
      break;

    case "message":
    case "response":
      removeThinking();
      addMessage("assistant", escapeHtml(data.content || data.text || data.message || JSON.stringify(data)));
      break;

    case "history":
      // Replay history events
      (data.events || []).forEach(e => handleEvent(e.type, e.payload));
      break;

    case "heartbeat":
    case "pong":
      break;

    default:
      // Generic event
      if (data.message || data.content) {
        addMessage("assistant", escapeHtml(data.message || data.content));
      }
  }
}

function sendWS(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

// ── User input ──
function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  addMessage("user", escapeHtml(text));
  inputEl.value = "";

  // Send via WS
  sendWS({ action: "message", content: text });

  // Also POST to HTTP API as fallback
  fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text }),
  }).then(r => r.json()).then(data => {
    if (data.response || data.message) {
      removeThinking();
      addMessage("assistant", escapeHtml(data.response || data.message));
    }
  }).catch(() => {});

  addThinking();
}

sendBtn.addEventListener("click", sendMessage);
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Init ──
connectWS();
</script>
</body>
</html>
