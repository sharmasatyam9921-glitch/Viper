<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIPER 5.0 — Dashboard (build 0328)</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- CDN Libraries -->
<script src="https://unpkg.com/preact@10.19.3/dist/preact.umd.js"></script>
<script src="https://unpkg.com/preact@10.19.3/hooks/dist/hooks.umd.js"></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

<style>
/* ══════════════════════════════════════════════════════════════
   VIPER 5.0 — CSS Foundation
   ══════════════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #06090f;
  --bg-secondary: #0d1117;
  --bg-tertiary: #161b22;
  --bg-card: rgba(13, 17, 23, 0.75);
  --bg-hover: rgba(99, 102, 241, 0.08);
  --bg-active: rgba(99, 102, 241, 0.15);
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --border: rgba(48, 54, 61, 0.5);
  --border-hover: rgba(99, 102, 241, 0.4);

  --accent: #6366f1;
  --accent-light: #818cf8;
  --accent-dim: rgba(99, 102, 241, 0.15);
  --neon-cyan: #22d3ee;
  --neon-green: #34d399;
  --neon-pink: #f472b6;
  --neon-orange: #fb923c;
  --neon-purple: #a78bfa;
  --neon-red: #ef4444;

  --critical: #ff3b30;
  --high: #ff9500;
  --medium: #ffcc00;
  --low: #5ac8fa;
  --info: #636366;
  --success: #30d158;
  --danger: #ff453a;
  --warning: #ffd60a;

  --glass-bg: rgba(13, 17, 23, 0.6);
  --glass-border: rgba(255, 255, 255, 0.05);
  --glass-blur: 16px;

  --sidebar-w: 64px;
  --sidebar-w-expanded: 240px;
  --topbar-h: 52px;
  --statusbar-h: 32px;
  --radius: 14px;
  --radius-sm: 8px;
  --radius-xs: 5px;
  --font-ui: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 20px rgba(99,102,241,0.15);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-fast: 0.15s ease;
}

body.light-theme {
  --bg-primary: #f4f6f9;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f0f2f5;
  --bg-card: rgba(255,255,255,0.8);
  --bg-hover: rgba(99,102,241,0.06);
  --bg-active: rgba(99,102,241,0.12);
  --text-primary: #1a1a2e;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --border: rgba(0,0,0,0.08);
  --border-hover: rgba(99,102,241,0.3);
  --glass-bg: rgba(255,255,255,0.65);
  --glass-border: rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
  --shadow-glow: 0 0 20px rgba(99,102,241,0.08);
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-ui);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

/* ── Layout Shell ── */
#app {
  display: grid;
  grid-template-rows: var(--topbar-h) 1fr var(--statusbar-h);
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-areas:
    "topbar topbar"
    "sidebar main"
    "statusbar statusbar";
  height: 100vh;
  overflow: hidden;
}

/* ── Top Bar ── */
.topbar {
  grid-area: topbar;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  backdrop-filter: blur(var(--glass-blur));
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.3px;
}
.topbar-brand svg { flex-shrink: 0; }
.topbar-brand .v { color: var(--neon-cyan); }
.topbar-brand .version {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  background: var(--accent-dim);
  color: var(--accent-light);
  border-radius: 4px;
  letter-spacing: 0.5px;
}
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 14px;
}
.conn-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 500;
}
.conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--danger);
  transition: background 0.3s;
}
.conn-dot.connected {
  background: var(--success);
  box-shadow: 0 0 8px rgba(48,209,88,0.5);
}
.topbar-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: 16px;
}
.topbar-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--border-hover);
}
.project-selector {
  font-size: 12px;
  font-weight: 500;
  padding: 5px 10px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  cursor: pointer;
  outline: none;
}
.project-selector:focus { border-color: var(--accent); }

/* ── Sidebar ── */
.sidebar {
  grid-area: sidebar;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 0;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
  transition: width var(--transition);
  width: var(--sidebar-w);
  z-index: 90;
}
.sidebar:hover { width: var(--sidebar-w-expanded); }
.sidebar:hover .nav-label { opacity: 1; width: auto; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  width: calc(100% - 12px);
  padding: 10px 12px;
  margin: 2px 6px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  position: relative;
}
.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.nav-item.active {
  background: var(--bg-active);
  color: var(--accent-light);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 6px; bottom: 6px;
  width: 3px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}
.nav-icon {
  flex-shrink: 0;
  width: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.nav-label {
  opacity: 0;
  width: 0;
  transition: opacity 0.2s, width 0.2s;
  overflow: hidden;
}
.nav-badge {
  margin-left: auto;
  padding: 1px 7px;
  font-size: 10px;
  font-weight: 600;
  background: var(--danger);
  color: #fff;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}
.nav-divider {
  width: 60%;
  height: 1px;
  background: var(--border);
  margin: 8px auto;
}

/* ── Main Content ── */
.main-content {
  grid-area: main;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px;
  scroll-behavior: smooth;
}

/* ── Status Bar ── */
.statusbar {
  grid-area: statusbar;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  z-index: 100;
}
.statusbar-left, .statusbar-right {
  display: flex; align-items: center; gap: 16px;
}
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 1px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
}
.progress-bar-mini {
  width: 100px; height: 4px;
  background: var(--bg-tertiary);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-mini-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--neon-cyan));
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* ══════════════════════════════════════════════════════════════
   Component Styles
   ══════════════════════════════════════════════════════════════ */

/* Glass Card */
.glass-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  backdrop-filter: blur(var(--glass-blur));
  padding: 20px;
  transition: all var(--transition);
}
.glass-card:hover {
  border-color: var(--border-hover);
  box-shadow: var(--shadow-glow);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title svg { opacity: 0.6; }

/* KPI Cards */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}
.kpi-card {
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.kpi-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.kpi-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.kpi-value {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1;
  font-feature-settings: 'tnum';
}
.kpi-sub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 6px;
}
.kpi-change {
  font-size: 11px;
  font-weight: 600;
  margin-top: 4px;
}
.kpi-change.up { color: var(--success); }
.kpi-change.down { color: var(--danger); }

/* Severity colors */
.clr-critical { color: var(--critical); }
.clr-high { color: var(--high); }
.clr-medium { color: var(--medium); }
.clr-low { color: var(--low); }
.clr-info { color: var(--info); }
.clr-accent { color: var(--accent-light); }
.clr-success { color: var(--success); }
.clr-cyan { color: var(--neon-cyan); }

/* Charts */
.chart-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}
.chart-wrap {
  position: relative;
  width: 100%;
  height: 260px;
}
.chart-wrap canvas {
  width: 100% !important;
  height: 100% !important;
}

/* Risk Gauge */
.gauge-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 260px;
}
.gauge-svg { width: 200px; height: 120px; }
.gauge-value {
  font-size: 42px;
  font-weight: 800;
  letter-spacing: -2px;
  margin-top: -10px;
}
.gauge-label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}

/* Activity Feed */
.activity-feed {
  max-height: 400px;
  overflow-y: auto;
}
.activity-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  animation: slideInLeft 0.3s ease;
}
.activity-item:last-child { border-bottom: none; }
.activity-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-top: 6px;
  flex-shrink: 0;
}
.activity-time {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-left: auto;
  flex-shrink: 0;
}

/* Quick Actions */
.quick-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 16px;
}
.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
  font-family: var(--font-ui);
}
.action-btn:hover {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent-light);
  box-shadow: var(--shadow-glow);
}
.action-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.action-btn.primary:hover {
  background: var(--accent-light);
}

/* ── 3D Graph Tab ── */
.graph-container {
  width: 100%;
  height: calc(100vh - var(--topbar-h) - var(--statusbar-h) - 40px);
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  background: #000;
}
.graph-controls {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.graph-control-group {
  display: flex;
  gap: 4px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  border-radius: var(--radius-sm);
  padding: 4px;
}
.graph-btn {
  padding: 6px 12px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius-xs);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-family: var(--font-ui);
}
.graph-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.graph-btn.active { background: var(--accent); color: #fff; }
.graph-search {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 10;
}
.graph-search input {
  width: 220px;
  padding: 8px 12px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 12px;
  font-family: var(--font-ui);
  backdrop-filter: blur(12px);
  outline: none;
  transition: border-color var(--transition-fast);
}
.graph-search input:focus { border-color: var(--accent); }
.graph-search input::placeholder { color: var(--text-muted); }
.graph-legend {
  position: absolute;
  bottom: 12px;
  left: 12px;
  z-index: 10;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 8px 14px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  border-radius: var(--radius-sm);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: opacity var(--transition-fast);
}
.legend-item:hover { opacity: 0.7; }
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}

/* Node Detail Drawer */
.node-drawer {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 360px;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  z-index: 20;
  padding: 20px;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform var(--transition);
}
.node-drawer.open { transform: translateX(0); }
.drawer-close {
  position: absolute;
  top: 14px; right: 14px;
  background: none; border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 18px;
}
.drawer-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  padding-right: 30px;
}
.drawer-section {
  margin-bottom: 16px;
}
.drawer-section h4 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.drawer-field {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.drawer-field-label { color: var(--text-secondary); }
.drawer-field-value { color: var(--text-primary); font-weight: 500; }

/* ── Findings Tab ── */
.findings-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-input {
  flex: 1;
  min-width: 200px;
  padding: 8px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font-ui);
  outline: none;
}
.filter-input:focus { border-color: var(--accent); }
.filter-select {
  padding: 8px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 12px;
  font-family: var(--font-ui);
  cursor: pointer;
  outline: none;
}
.findings-table {
  width: 100%;
  border-collapse: collapse;
}
.findings-table thead th {
  text-align: left;
  padding: 10px 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg-secondary);
  z-index: 2;
}
.findings-table tbody tr {
  cursor: pointer;
  transition: background var(--transition-fast);
}
.findings-table tbody tr:hover { background: var(--bg-hover); }
.findings-table tbody td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.sev-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.sev-critical { background: rgba(255,59,48,0.15); color: var(--critical); }
.sev-high { background: rgba(255,149,0,0.15); color: var(--high); }
.sev-medium { background: rgba(255,204,0,0.15); color: var(--medium); }
.sev-low { background: rgba(90,200,250,0.15); color: var(--low); }
.sev-info { background: rgba(99,99,102,0.15); color: var(--info); }

/* ── Targets Tab ── */
.targets-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
}
.target-card {
  padding: 18px;
  cursor: pointer;
}
.target-card:hover { border-color: var(--accent); }
.target-domain {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.target-domain .status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--success);
}
.target-meta {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
.target-techs {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.tech-tag {
  padding: 2px 8px;
  font-size: 10px;
  font-weight: 600;
  background: var(--accent-dim);
  color: var(--accent-light);
  border-radius: 4px;
}

/* ── Insights Tab ── */
.insights-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.insight-card {
  padding: 18px;
}
.insight-card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
}

<div id="app"></div>

<script>
/* ══════════════════════════════════════════════════════════════
   VIPER 5.0 — Preact SPA Application
   ══════════════════════════════════════════════════════════════ */
const { h, render, Component, Fragment } = preact;
const { useState, useEffect, useRef, useCallback, useMemo } = preactHooks;
const html = htm.bind(h);

/* ── Constants ── */
const NODE_COLORS = {
  target: '#ef4444', subdomain: '#fb923c', endpoint: '#3b82f6',
  finding: '#fbbf24', technology: '#34d399', cve: '#a78bfa',
  parameter: '#f472b6', header: '#6366f1', attackchain: '#ec4899',
  vulnerability: '#fbbf24', ip: '#fb923c', port: '#38bdf8',
  service: '#818cf8', secret: '#f43f5e', default: '#6b7280'
};
const SEVERITY_COLORS = {
  critical: '#ff3b30', high: '#ff9500', medium: '#ffcc00',
  low: '#5ac8fa', info: '#636366'
};
const SEVERITY_ORDER = ['critical','high','medium','low','info'];

const TABS = [
  { id: 'overview',  icon: '\u2B22', label: 'Overview' },
  { id: 'agents',    icon: '\u2726', label: 'Agents' },
  { id: 'graph',     icon: '\u2B2F', label: 'Graph' },
  { id: 'findings',  icon: '\u26A0', label: 'Findings' },
  { id: 'targets',   icon: '\u25CE', label: 'Targets' },

];

/* ══════════════════════════════════════════════════════════════
   Global State & WebSocket
   ══════════════════════════════════════════════════════════════ */

class DataStore {
  constructor() {
    this.listeners = new Set();
    this.state = {
      connected: false,
      activeTab: 'overview',
      theme: localStorage.getItem('viper-theme') || 'dark',
      // Overview
      overview: null,
      riskScore: null,
      logs: [],
      // Graph
      graphData: null,
      graphStats: null,
      // Findings
      findings: [],
      findingsTotal: 0,
      findingsByType: [],
      findingsBySeverity: [],
      findingsTimeline: [],
      // Targets
      targets: [],
      // Attacks
      attackStats: null,
      attackHistory: [],
      killChain: null,
      // React traces
      reactTraces: [],
      // Settings
      settings: null,
      // Agent
      agentStatus: null,
      thinkingChunks: [],
      // v5 Multi-Agent
      v5Agents: null,
      v5Modules: null,
      v5FailureLessons: null,
      v5Evolution: null,
      // Agent Monitor
      agentMonitor: null,
      agentTimeline: [],
      reactCurrent: null,
      // Events
      lastEvent: null,
      scanProgress: 0,
      // Node drawer
      selectedNode: null,
      // Chat
      chatMessages: [],
      // Terminal
      terminalLines: [],
    };
  }

  getState() { return this.state; }

  setState(patch) {
    Object.assign(this.state, patch);
    this.listeners.forEach(fn => fn(this.state));
  }

  subscribe(fn) {
    this.listeners.add(fn);
    return () => this.listeners.delete(fn);
  }
}

const store = new DataStore();

function useStore() {
  const [state, setState] = useState(store.getState());
  useEffect(() => store.subscribe(s => setState({...s})), []);
  return state;
}

/* ── WebSocket Manager ── */
class WSManager {
  constructor() {
    this.ws = null;
    this.reconnectDelay = 1000;
    this.maxDelay = 30000;
    this.connect();
  }

  connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    this.ws = new WebSocket(`${proto}://${location.host}/ws`);

    this.ws.onopen = () => {
      store.setState({ connected: true });
      this.reconnectDelay = 1000;
    };

    this.ws.onclose = () => {
      store.setState({ connected: false });
      setTimeout(() => this.connect(), this.reconnectDelay);
      this.reconnectDelay = Math.min(this.reconnectDelay * 1.5, this.maxDelay);
    };

    this.ws.onerror = () => {};

    this.ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        this.handleMessage(msg);
      } catch(ex) {}
    };
  }

  send(type, data = {}) {
    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
      this.ws.send(JSON.stringify({ type, ...data }));
    }
  }

  handleMessage(msg) {
    const t = msg.type;
    store.setState({ lastEvent: { type: t, time: new Date() }});

    switch(t) {
      case 'connected':
        store.setState({ connected: true });
        break;
      case 'finding_new':
        store.setState({
          findings: [msg.data || msg, ...store.getState().findings].slice(0, 200)
        });
        break;
      case 'phase_update':
        store.setState({ scanProgress: msg.progress || store.getState().scanProgress });
        break;
      case 'thinking_chunk':
        store.setState({
          thinkingChunks: [...store.getState().thinkingChunks, msg.data || msg.chunk || ''].slice(-50)
        });
        break;
      case 'tool_start':
      case 'tool_output':
      case 'tool_complete':
        store.setState({
          terminalLines: [
            ...store.getState().terminalLines,
            { type: t === 'tool_start' ? 'cmd' : 'out', text: msg.data || msg.output || msg.tool || JSON.stringify(msg), time: new Date() }
          ].slice(-500)
        });
        break;
      case 'stats_update':
      case 'stats':
        if (msg.data) store.setState({ overview: msg.data });
        break;
      case 'log_line':
        const logEntry = msg.data || msg;
        const logText = typeof logEntry === 'string' ? logEntry : logEntry.text || JSON.stringify(logEntry);
        const logLevel = (typeof logEntry === 'object' && logEntry.level) || 'INFO';
        store.setState({
          logs: [...(store.getState().logs || []), { text: logText, level: logLevel, time: new Date() }].slice(-500),
          terminalLines: [
            ...store.getState().terminalLines,
            { type: logLevel === 'ERROR' ? 'error' : logLevel === 'SUCCESS' ? 'success' : 'info', text: logText, time: new Date() }
          ].slice(-500)
        });
        break;
      case 'scan_started':
      case 'scan_completed':
      case 'scan_error':
        // Refresh overview data when scan state changes
        api('/api/overview').then(ov => { if(ov) store.setState({ overview: ov }); });
        break;
      case 'finding_new':
        store.setState({
          findings: [msg.data || msg, ...store.getState().findings].slice(0, 200)
        });
        break;
      case 'phase_update':
        store.setState({ scanProgress: msg.progress || msg.data?.progress || store.getState().scanProgress });
        break;
      case 'agent_event':
      case 'react_step':
      case 'deep_think':
      case 'phase_update_agent':
        // Agent monitor timeline events — handled by AgentsTab directly via override
        store.setState({
          agentTimeline: [...(store.getState().agentTimeline || []), {
            type: t,
            agent: (msg.payload || msg.data || {}).agent || 'system',
            text: (msg.payload || msg.data || {}).text || '',
            time: (msg.payload || msg.data || {}).time || new Date().toLocaleTimeString('en-US', {hour12:false}),
            timestamp: Date.now(),
          }].slice(-200),
        });
        break;
      default:
        break;
    }
  }
}

const wsManager = new WSManager();

/* ── API Fetcher ── */
async function api(path) {
  try {
    const r = await fetch(path);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

/* ══════════════════════════════════════════════════════════════
   SVG Icons (inline, small)

const Icon = {
  viper: () => html`<svg width="28" height="28" viewBox="0 0 120 120" fill="none">
    <path d="M60 18 C80 18, 95 30, 95 45 C95 55, 85 62, 75 58 C65 54, 60 60, 60 68 C60 76, 65 82, 75 82 C85 82, 92 75, 92 65" stroke="var(--neon-cyan)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M88 60 L100 65 L88 70 Z" fill="var(--neon-green)"/>
    <circle cx="94" cy="63" r="2.5" fill="var(--neon-cyan)"/>
    <line x1="100" y1="65" x2="108" y2="62" stroke="var(--neon-red)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="100" y1="65" x2="108" y2="68" stroke="var(--neon-red)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M60 18 C45 18, 30 28, 28 40 C26 50, 32 55, 38 50" stroke="var(--neon-cyan)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  </svg>`,
  sun: () => html`<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>`,
  moon: () => html`<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M13.36 10.06A6 6 0 015.94 2.64 7 7 0 1013.36 10.06z"/></svg>`,
};

/* ══════════════════════════════════════════════════════════════
   Components
   ══════════════════════════════════════════════════════════════ */

/* ── Top Bar ── */
function TopBar({ state }) {
  const toggleTheme = () => {
    const next = state.theme === 'dark' ? 'light' : 'dark';
    store.setState({ theme: next });
    localStorage.setItem('viper-theme', next);
    document.body.classList.toggle('light-theme', next === 'light');
  };

  return html`
    <header class="topbar">
      <div class="topbar-brand">
        ${Icon.viper()}
        <span><span class="v">VIPER</span> 5.0</span>
        <span class="version">MULTI-AGENT ENGINE</span>
      </div>
      <div class="topbar-actions">
        <div class="conn-status">
          <div class="conn-dot ${state.connected ? 'connected' : ''}"></div>
          <span>${state.connected ? 'Connected' : 'Disconnected'}</span>
        </div>
        <select class="project-selector" title="Active project">
          <option>All Targets</option>
        </select>
        <button class="topbar-btn" onclick=${toggleTheme} title="Toggle theme">
          ${state.theme === 'dark' ? Icon.sun() : Icon.moon()}
        </button>
      </div>

  `;
}

/* ── Sidebar ── */
function Sidebar({ state }) {
  const findingsCount = state.findings.length || state.findingsTotal || 0;

  return html`
    <nav class="sidebar">
      ${TABS.map(tab => {
        if (tab.divider) return html`<div class="nav-divider" key=${tab.id}></div>`;
        return html`
          <div class="nav-item ${state.activeTab === tab.id ? 'active' : ''}"
               key=${tab.id}
               onclick=${() => store.setState({ activeTab: tab.id })}>

            <span class="nav-label">${tab.label}</span>

              : null}

}

/* ── Status Bar ── */
function StatusBar({ state }) {

/* ══════════════════════════════════════════════════════════════
   Tab: Overview
   ══════════════════════════════════════════════════════════════ */
function OverviewTab({ state }) {
  const [loading, setLoading] = useState(true);
  const [scanStatus, setScanStatus] = useState('');

  const startScan = async () => {
    const target = prompt('Enter target URL (e.g., https://example.com):');
    if (!target) return;
    setScanStatus('Launching VIPER full hunt on ' + target + '...');
    try {
      const resp = await fetch('/api/scan/start', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target })
      });
      const data = await resp.json();
      if (data.error) {
        setScanStatus('Error: ' + data.error);
        return;
      }
      const scanId = data.scan_id;
      setScanStatus('Scan ' + scanId + ' started on ' + target + '. Switching to Agents tab for live view...');
      // Switch to Agents tab to watch live progress
      setTimeout(() => store.setState({ activeTab: 'agents' }), 2000);
      // Poll scan status
      const poll = setInterval(async () => {
        try {
          const sr = await fetch('/api/scan/status', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ scan_id: scanId })
          });
          const sd = await sr.json();
          if (sd.status === 'completed') {
            clearInterval(poll);
            setScanStatus('Scan complete! ' + (sd.findings || 0) + ' findings. Refreshing data...');
            refreshAll();
          } else if (sd.status === 'error') {
            clearInterval(poll);
            setScanStatus('Scan error: ' + (sd.error || 'unknown'));
          } else {
            setScanStatus('Scanning ' + target + ' | Phase: ' + (sd.phase || '...') + ' | Findings: ' + (sd.findings || 0));
          }
        } catch(e) {}
      }, 5000);
    } catch(e) {
      setScanStatus('Failed to start scan: ' + e.message);
    }
  };

  const exportFindings = async () => {
    try {
      const resp = await fetch('/api/export/excel', { method: 'POST' });
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'viper_findings.csv'; a.click();
      URL.revokeObjectURL(url);
    } catch(e) { alert('Export failed: ' + e.message); }
  };

  const refreshAll = async () => {
    setLoading(true);
    const [ov, risk, logs, bySev, byType, timeline] = await Promise.all([
      api('/api/overview'), api('/api/risk-score'), api('/api/logs?limit=50'),
      api('/api/findings/by-severity'), api('/api/findings/by-type'), api('/api/findings/timeline'),
    ]);
    store.setState({
      overview: ov, riskScore: risk,
      logs: Array.isArray(logs) ? logs : (logs?.logs || []),
      findingsBySeverity: Array.isArray(bySev) ? bySev : [],
      findingsByType: Array.isArray(byType) ? byType : [],
      findingsTimeline: Array.isArray(timeline) ? timeline : [],
    });
    setLoading(false);
  };

  useEffect(() => {
    let mounted = true;
    Promise.all([
      api('/api/overview'),
      api('/api/risk-score'),
      api('/api/logs?limit=30'),
      api('/api/findings/by-severity'),
      api('/api/findings/by-type'),
      api('/api/findings/timeline'),
    ]).then(([ov, risk, logs, bySev, byType, timeline]) => {
      if (!mounted) return;
      store.setState({
        overview: ov,
        riskScore: risk,
        logs: Array.isArray(logs) ? logs : (logs?.logs || []),
        findingsBySeverity: Array.isArray(bySev) ? bySev : [],
        findingsByType: Array.isArray(byType) ? byType : [],
        findingsTimeline: Array.isArray(timeline) ? timeline : [],
      });
      setLoading(false);
    });
    return () => { mounted = false; };
  }, []);

  // Auto-refresh logs every 10s (fallback when WS not connected)
  useEffect(() => {
    const iv = setInterval(() => {
      api('/api/logs?limit=50').then(logs => {
        const arr = Array.isArray(logs) ? logs : (logs?.logs || []);
        if (arr.length > 0) store.setState({ logs: arr });
      }).catch(() => {});
    }, 10000);
    return () => clearInterval(iv);
  }, []);

  if (loading && !state.overview) {
    return html`<div class="loading-spinner"><div class="spinner"></div> Loading overview...</div>`;
  }

  const ov = state.overview || {};
  const risk = state.riskScore;
  const riskVal = typeof risk === 'object' ? (risk?.score ?? risk?.risk_score ?? 0) : (risk ?? 0);
  const logs = state.logs || [];

  return html`

      <!-- Live Session Stats (from running VIPER) -->

            ${KpiCard({ label: 'Live Findings', value: ov.live.total_findings || 0, color: 'var(--high)', accent: 'var(--high)' })}
            ${KpiCard({ label: 'Validated', value: (ov.live.validated_findings || 0).toLocaleString(), color: 'var(--success)', accent: 'var(--success)' })}
            ${KpiCard({ label: 'FPs Caught', value: (ov.live.false_positives_caught || 0).toLocaleString(), color: 'var(--neon-pink)', accent: 'var(--neon-pink)' })}
          </div>
        </div>
      ` : null}

      <!-- DB Stats (historical) -->
      <div class="kpi-grid">
        ${KpiCard({ label: 'Targets (DB)', value: ov.targets ?? '--', color: 'var(--accent-light)', accent: 'var(--accent)' })}
        ${KpiCard({ label: 'Findings (DB)', value: ov.findings ?? '--', color: 'var(--high)', accent: 'var(--high)' })}
        ${KpiCard({ label: 'Critical', value: ov.critical ?? '--', color: 'var(--critical)', accent: 'var(--critical)' })}
        ${KpiCard({ label: 'High', value: ov.high ?? '--', color: 'var(--high)', accent: 'var(--high)' })}
        ${KpiCard({ label: 'Validated (DB)', value: ov.validated ?? '--', color: 'var(--success)', accent: 'var(--success)' })}
        ${KpiCard({ label: 'Attacks (DB)', value: ov.attacks ?? '--', color: 'var(--neon-cyan)', accent: 'var(--neon-cyan)' })}
      </div>

      <!-- v5 Agent Status Bar -->
      <div class="glass-card" style="padding: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <span style="font-size: 13px; color: var(--text-muted);">v5 Engine</span>
          <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--neon-green); box-shadow: 0 0 6px var(--neon-green);"></span>
        </div>
        <div style="display: flex; gap: 16px; font-size: 12px; font-family: 'JetBrains Mono', monospace;">
          <span style="color: var(--neon-cyan);">4 Agents</span>
          <span style="color: var(--accent-light);">5 Topics</span>
          <span style="color: var(--neon-green);">CVSS v4.0</span>
          <span style="color: var(--neon-pink);">Self-Learning</span>
          <span style="color: var(--neon-orange);">Stealth</span>
        </div>
        <div style="margin-left: auto;">
          <button class="topbar-btn" style="font-size: 11px; padding: 4px 10px;" onclick=${() => store.setState({ activeTab: 'agents' })}>View Agents →</button>

      </div>

      <!-- Charts Row -->

        <div class="glass-card">
          <div class="card-header"><span class="card-title">Severity Distribution</span></div>
          <div class="chart-wrap"><${SeverityDonut} data=${state.findingsBySeverity} /></div>
        </div>
        <div class="glass-card">

        <div class="glass-card">
          <div class="card-header"><span class="card-title">Findings Timeline</span></div>
          <div class="chart-wrap"><${TimelineChart} data=${state.findingsTimeline} /></div>
        </div>
        <div class="glass-card">
          <div class="card-header"><span class="card-title">Top Vulnerability Types</span></div>
          <div class="chart-wrap"><${VulnTypesChart} data=${state.findingsByType} /></div>
        </div>

      <!-- Activity Feed (VIPER Live Logs) -->
      <div class="glass-card" style="margin-top: 14px;">
        <div class="card-header">
          <span class="card-title">VIPER Live Activity</span>
          <span style="font-size:11px;color:var(--text-muted)">${logs.length} events</span>
        </div>
        <div class="activity-feed" style="max-height:400px;overflow-y:auto">
          ${logs.length === 0 ? html`<div style="padding:20px;text-align:center;color:var(--text-muted)">No VIPER logs yet. Start a scan or wait for auto-refresh (10s).</div>` : null}
          ${logs.slice(-50).reverse().map((log, i) => {
            const text = typeof log === 'string' ? log : (log.text || log.message || log.msg || JSON.stringify(log));
            const rawLevel = typeof log === 'object' ? (log.level || '') : '';
            const level = text.includes('[ERROR]') ? 'error' : text.includes('[WARN]') ? 'warning' : text.includes('[SUCCESS]') ? 'success' : (rawLevel.toLowerCase() || 'info');
            const dotColor = level === 'error' ? 'var(--danger)' : level === 'warning' ? 'var(--warning)' : level === 'success' ? 'var(--success)' : 'var(--accent)';
            const time = (typeof log === 'object' && log.timestamp) || (typeof log === 'object' && log.time) || '';
            return html`
              <div class="activity-item" key=${i}>
                <div class="activity-dot" style="background:${dotColor}"></div>
                <div style="flex:1;word-break:break-word;font-family:monospace;font-size:12px">${text}</div>
                ${time ? html`<span class="activity-time">${new Date(time).toLocaleTimeString()}</span>` : null}
              </div>
            `;
          })}
          ${logs.length === 0 ? html`<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">No recent activity</div>` : null}
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="glass-card" style="margin-top: 14px;">
        <div class="card-header"><span class="card-title">Quick Actions</span></div>
        <div class="quick-actions">
          <button class="action-btn primary" onclick=${startScan}>Start Scan</button>
          <button class="action-btn" onclick=${() => store.setState({ activeTab: 'terminal' })}>Open Terminal</button>
          <button class="action-btn" onclick=${exportFindings}>Export CSV</button>
          <button class="action-btn" onclick=${() => store.setState({ activeTab: 'graph' })}>View Graph</button>
          <button class="action-btn" onclick=${() => store.setState({ activeTab: 'chat' })}>Ask AI</button>
          <button class="action-btn" onclick=${refreshAll}>Refresh All</button>
        </div>
        ${scanStatus ? html`<div style="margin-top:10px;padding:8px 12px;background:var(--surface);border-radius:6px;font-size:12px;font-family:monospace">${scanStatus}</div>` : null}
      </div>
    </div>
  `;
}

function KpiCard({ label, value, color, accent }) {
  return html`
    <div class="glass-card kpi-card" style="border-top: 2px solid ${accent}">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value" style="color:${color}">${value}</div>

}

/* ── Charts ── */
function SeverityDonut({ data }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();

    const labels = [];
    const values = [];
    const colors = [];
    if (Array.isArray(data) && data.length) {
      data.forEach(d => {
        const sev = (d.severity || d.name || d.label || '').toLowerCase();
        labels.push(sev.charAt(0).toUpperCase() + sev.slice(1));
        values.push(d.count || d.value || 0);
        colors.push(SEVERITY_COLORS[sev] || '#6b7280');
      });
    } else {
      labels.push('No data');
      values.push(1);
      colors.push('#333');
    }

    chartRef.current = new Chart(canvasRef.current, {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0, borderRadius: 4 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '72%',
        plugins: {
          legend: { position: 'right', labels: { color: getComputedStyle(document.body).getPropertyValue('--text-secondary').trim(), font: { family: 'Inter', size: 11 }, padding: 12, usePointStyle: true, pointStyleWidth: 8 } },
        },
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [data]);

  return html`<canvas ref=${canvasRef}></canvas>`;
}

/* ── Risk Gauge (animated SVG) ── */
function RiskGauge({ score }) {
  const val = Math.max(0, Math.min(100, score || 0));
  const angle = (val / 100) * 180;
  const rad = (angle - 180) * Math.PI / 180;
  const r = 80;
  const cx = 100, cy = 95;
  const x = cx + r * Math.cos(rad);
  const y = cy + r * Math.sin(rad);
  const large = angle > 180 ? 1 : 0;
  const d = `M ${cx - r} ${cy} A ${r} ${r} 0 ${angle > 180 ? 1 : 0} 1 ${x} ${y}`;
  const gaugeColor = val >= 80 ? 'var(--critical)' : val >= 60 ? 'var(--high)' : val >= 40 ? 'var(--medium)' : val >= 20 ? 'var(--low)' : 'var(--success)';

  return html`
    <div class="gauge-container">
      <svg class="gauge-svg" viewBox="0 0 200 110">
        <path d="M 20 95 A 80 80 0 0 1 180 95" fill="none" stroke="var(--border)" stroke-width="10" stroke-linecap="round"/>
        <path d="${d}" fill="none" stroke="${gaugeColor}" stroke-width="10" stroke-linecap="round"
              style="transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);">
          <animate attributeName="stroke-dashoffset" from="252" to="0" dur="1.2s" fill="freeze"/>
        </path>
      </svg>
      <div class="gauge-value" style="color:${gaugeColor}">${val}</div>
      <div class="gauge-label">Risk Score / 100</div>
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════════
   Tab: 3D Knowledge Graph
   ══════════════════════════════════════════════════════════════ */
function GraphTab({ state }) {
  const containerRef = useRef(null);
  const graphRef = useRef(null);
  const [mode, setMode] = useState('3d');
  const [search, setSearch] = useState('');
  const [loading, setLoading] = useState(true);
  const [graphData, setGraphData] = useState(null);
  const [selectedNode, setSelectedNode] = useState(null);
  const [filterTypes, setFilterTypes] = useState(new Set());

  // Fetch graph data
  useEffect(() => {
    let mounted = true;
    api('/api/graph').then(data => {
      if (!mounted) return;
      if (data) {
        // Normalize: ensure nodes/links arrays
        const gd = {
          nodes: data.nodes || data.vertices || [],
          links: data.links || data.edges || [],
        };
        // Ensure node ids and colors (API returns capitalized group names)
        gd.nodes.forEach(n => {
          if (!n.id && n.name) n.id = n.name;
          const key = (n.type || n.group || '').toLowerCase();
          n._nodeType = key;
          n.color = NODE_COLORS[key] || NODE_COLORS.default;
          // Handle vis.js color objects from API
          if (n.color && typeof n.color === 'object') n.color = n.color.background || NODE_COLORS.default;
          n.val = n.size || (key === 'target' ? 10 : key === 'finding' ? 6 : key === 'attackchain' ? 8 : 4);
        });
        // Ensure link source/target
        gd.links.forEach(l => {
          if (!l.source && l.from) l.source = l.from;
          if (!l.target && l.to) l.target = l.to;
        });
        setGraphData(gd);
        store.setState({ graphData: gd });
      }
      setLoading(false);
    });
    return () => { mounted = false; };
  }, []);

  // Render 3D graph
  useEffect(() => {
    if (!containerRef.current || !graphData || mode !== '3d') return;

    // Clean up previous
    if (graphRef.current) {
      graphRef.current._destructor && graphRef.current._destructor();
      containerRef.current.innerHTML = '';
    }

    if (typeof ForceGraph3D === 'undefined') {
      containerRef.current.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted)">3D graph library not loaded</div>';
      return;
    }

    const filtered = applyFilters(graphData, search, filterTypes);

    const graph = ForceGraph3D()(containerRef.current)
      .graphData(filtered)
      .nodeLabel(n => `${n.type}: ${n.name || n.label || n.id}`)
      .nodeColor(n => typeof n.color === 'string' ? n.color : (n.color?.background || NODE_COLORS[(n.type||n.group||'').toLowerCase()] || NODE_COLORS.default))
      .nodeVal(n => n.val || 4)
      .nodeOpacity(0.9)
      .linkColor(() => 'rgba(99,102,241,0.2)')
      .linkWidth(0.5)
      .linkOpacity(0.4)
      .backgroundColor('#06090f')
      .onNodeClick(n => setSelectedNode(n))
      .enableNodeDrag(true)
      .width(containerRef.current.clientWidth)
      .height(containerRef.current.clientHeight);

    graphRef.current = graph;

    const ro = new ResizeObserver(() => {
      if (containerRef.current && graphRef.current) {
        graphRef.current.width(containerRef.current.clientWidth);
        graphRef.current.height(containerRef.current.clientHeight);
      }
    });
    ro.observe(containerRef.current);

    return () => {
      ro.disconnect();
      if (graphRef.current && graphRef.current._destructor) graphRef.current._destructor();
    };
  }, [graphData, mode, search, filterTypes]);

  // Render 2D fallback
  useEffect(() => {
    if (!containerRef.current || !graphData || mode !== '2d') return;
    containerRef.current.innerHTML = '';

    const filtered = applyFilters(graphData, search, filterTypes);
    const visNodes = filtered.nodes.map(n => ({
      id: n.id,
      label: n.name || n.label || n.id,
      color: { background: n.color, border: n.color, highlight: { background: '#fff', border: n.color } },
      font: { color: '#c9d1d9', size: 10 },
      size: (n.val || 4) * 3,
    }));
    const visEdges = filtered.links.map((l, i) => ({
      id: i,
      from: typeof l.source === 'object' ? l.source.id : l.source,
      to: typeof l.target === 'object' ? l.target.id : l.target,
      color: { color: 'rgba(99,102,241,0.3)' },
    }));

    if (typeof vis !== 'undefined' && vis.Network) {
      const network = new vis.Network(containerRef.current, {
        nodes: new vis.DataSet(visNodes),
        edges: new vis.DataSet(visEdges),
      }, {
        physics: { stabilization: { iterations: 150 } },
        nodes: { shape: 'dot', borderWidth: 2 },
        edges: { smooth: { type: 'continuous' } },
        interaction: { hover: true },
      });
      network.on('click', params => {
        if (params.nodes.length) {
          const nd = filtered.nodes.find(n => n.id === params.nodes[0]);
          if (nd) setSelectedNode(nd);
        }
      });
    } else {
      containerRef.current.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted)">2D graph: vis-network not loaded</div>';
    }
  }, [graphData, mode, search, filterTypes]);

  // Collect available node types
  const nodeTypes = useMemo(() => {
    if (!graphData) return [];
    const types = new Set();
    graphData.nodes.forEach(n => types.add(n.type || 'unknown'));
    return [...types].sort();
  }, [graphData]);

  function toggleFilter(type) {
    const next = new Set(filterTypes);
    if (next.has(type)) next.delete(type); else next.add(type);
    setFilterTypes(next);
  }

  if (loading) {
    return html`<div class="loading-spinner"><div class="spinner"></div> Loading graph data...</div>`;
  }
  if (!graphData || !graphData.nodes.length) {
    return html`<div class="empty-state"><h3>No Graph Data</h3><p>Run a scan to populate the knowledge graph</p></div>`;
  }

  return html`
    <div class="graph-container animate-in">
      <div ref=${containerRef} style="width:100%;height:100%"></div>

      <!-- Controls -->
      <div class="graph-controls">
        <div class="graph-control-group">
          <button class="graph-btn ${mode==='3d'?'active':''}" onclick=${()=>setMode('3d')}>3D</button>
          <button class="graph-btn ${mode==='2d'?'active':''}" onclick=${()=>setMode('2d')}>2D</button>
        </div>
        <div class="graph-control-group" style="flex-wrap:wrap;max-width:200px;">
          ${nodeTypes.map(t => html`
            <button key=${t} class="graph-btn ${filterTypes.size===0 || filterTypes.has(t) ? 'active' : ''}"
                    onclick=${() => toggleFilter(t)}
                    style="font-size:10px;padding:4px 8px;">
              <span class="legend-dot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${NODE_COLORS[t]||NODE_COLORS.default};margin-right:3px;"></span>
              ${t}
            </button>
          `)}
        </div>
      </div>

      <!-- Search -->
      <div class="graph-search">
        <input type="text" placeholder="Search nodes..."
               value=${search} oninput=${e => setSearch(e.target.value)} />
      </div>

      <!-- Legend -->
      <div class="graph-legend">
        ${Object.entries(NODE_COLORS).filter(([k]) => k !== 'default').map(([type, color]) => html`
          <div class="legend-item" key=${type}>
            <span class="legend-dot" style="background:${color}"></span>
            ${type}
          </div>
        `)}
      </div>

      <!-- Node Drawer -->
      <div class="node-drawer ${selectedNode ? 'open' : ''}">
        <button class="drawer-close" onclick=${() => setSelectedNode(null)}>x</button>
        ${selectedNode ? html`
          <div class="drawer-title" style="color:${selectedNode.color || 'var(--text-primary)'}">
            ${selectedNode.name || selectedNode.label || selectedNode.id}
          </div>
          <div class="drawer-section">
            <h4>Properties</h4>
            ${Object.entries(selectedNode).filter(([k]) => !['__threeObj','x','y','z','vx','vy','vz','fx','fy','fz','index','color','val','__indexColor'].includes(k)).map(([k,v]) => html`
              <div class="drawer-field" key=${k}>
                <span class="drawer-field-label">${k}</span>
                <span class="drawer-field-value">${typeof v === 'object' ? JSON.stringify(v) : String(v)}</span>
              </div>
            `)}
          </div>
        ` : null}
      </div>
    </div>
  `;
}

function applyFilters(graphData, search, filterTypes) {
  if (!graphData) return { nodes: [], links: [] };
  let nodes = graphData.nodes;
  if (filterTypes.size > 0) {
    nodes = nodes.filter(n => filterTypes.has(n.type));
  }
  if (search) {
    const q = search.toLowerCase();
    nodes = nodes.filter(n =>
      (n.name || n.label || n.id || '').toLowerCase().includes(q) ||
      (n.type || '').toLowerCase().includes(q)
    );
  }
  const nodeIds = new Set(nodes.map(n => n.id));
  const links = graphData.links.filter(l => {
    const src = typeof l.source === 'object' ? l.source.id : l.source;
    const tgt = typeof l.target === 'object' ? l.target.id : l.target;
    return nodeIds.has(src) && nodeIds.has(tgt);
  });
  return { nodes, links };
}

/* ══════════════════════════════════════════════════════════════
   Tab: Findings
   ══════════════════════════════════════════════════════════════ */
function FindingsTab({ state }) {
  const [findings, setFindings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('');
  const [sevFilter, setSevFilter] = useState('all');
  const [selected, setSelected] = useState(null);

  useEffect(() => {
    api('/api/findings?limit=200').then(data => {
      const list = Array.isArray(data) ? data : (data?.findings || []);
      setFindings(list);
      store.setState({ findings: list, findingsTotal: data?.total || list.length });
      setLoading(false);
    });
  }, []);

  const filtered = useMemo(() => {
    return findings.filter(f => {
      const sev = (f.severity || '').toLowerCase();
      if (sevFilter !== 'all' && sev !== sevFilter) return false;
      if (filter) {
        const q = filter.toLowerCase();
        return (f.title || f.name || '').toLowerCase().includes(q) ||
               (f.type || f.vuln_type || '').toLowerCase().includes(q) ||
               (f.url || f.target || '').toLowerCase().includes(q);
      }
      return true;
    });
  }, [findings, filter, sevFilter]);

  if (loading) return html`<div class="loading-spinner"><div class="spinner"></div> Loading ${findings.length > 0 ? findings.length : ''}  findings from API...</div>`;

  return html`
    <div class="animate-in">
      <div class="findings-toolbar">
        <input class="filter-input" placeholder="Search findings..." value=${filter} oninput=${e => setFilter(e.target.value)} />
        <select class="filter-select" value=${sevFilter} onchange=${e => setSevFilter(e.target.value)}>
          <option value="all">All Severity</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
          <option value="info">Info</option>
        </select>
        <span style="font-size:12px;color:var(--text-muted)">${filtered.length} results</span>
      </div>

      <div class="glass-card" style="padding:0;overflow:hidden;">
        <div style="max-height:calc(100vh - 220px);overflow-y:auto;">
          <table class="findings-table">
            <thead>
              <tr>
                <th>Severity</th>
                <th>Title</th>
                <th>Type</th>
                <th>Target</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${filtered.map((f, i) => {
                const sev = (f.severity || 'info').toLowerCase();
                return html`
                  <tr key=${f.id || i} onclick=${() => setSelected(selected === i ? null : i)}>
                    <td><span class="sev-badge sev-${sev}">${sev}</span></td>
                    <td style="font-weight:500">${f.title || f.name || 'Untitled'}</td>
                    <td style="color:var(--text-secondary);font-size:12px">${f.type || f.vuln_type || '-'}</td>
                    <td style="color:var(--text-muted);font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
                      ${f.url || f.target || f.domain || '-'}
                    </td>
                    <td>
                      <span class="sev-badge" style="background:${f.validated ? 'rgba(48,209,88,0.15)' : 'rgba(99,99,102,0.15)'};color:${f.validated ? 'var(--success)' : 'var(--text-muted)'}">
                        ${f.validated ? 'Validated' : f.status || 'Pending'}
                      </span>
                    </td>
                  </tr>
                  ${selected === i ? html`
                    <tr>
                      <td colspan="5" style="padding:16px;background:var(--bg-tertiary);">
                        <div style="font-size:13px;line-height:1.7;">
                          ${f.description ? html`<p style="margin-bottom:8px">${f.description}</p>` : null}
                          ${f.evidence ? html`<div class="code-block">${f.evidence}</div>` : null}
                          ${f.remediation ? html`<div style="margin-top:8px"><strong>Remediation:</strong> ${f.remediation}</div>` : null}
                          ${f.cvss_score != null ? html`<div style="margin-top:4px;color:var(--text-muted);font-size:12px">CVSS: ${f.cvss_score}</div>` : null}
                        </div>
                      </td>
                    </tr>
                  ` : null}
                `;
              })}
              ${filtered.length === 0 ? html`
                <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">No findings match your filters</td></tr>
              ` : null}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════════
   Tab: Targets
   ══════════════════════════════════════════════════════════════ */
function TargetsTab({ state }) {
  const [targets, setTargets] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    api('/api/targets').then(data => {
      const list = Array.isArray(data) ? data : (data?.targets || []);
      setTargets(list);
      store.setState({ targets: list });
      setLoading(false);
    });
  }, []);

  if (loading) return html`<div class="loading-spinner"><div class="spinner"></div> Loading targets...</div>`;
  if (!targets.length) return html`<div class="empty-state"><h3>No Targets</h3><p>Add targets to begin reconnaissance</p></div>`;

  return html`
    <div class="animate-in">
      <div class="targets-grid">
        ${targets.map((t, i) => {
          const domain = t.domain || t.url || t.name || 'Unknown';
          const techs = Array.isArray(t.technologies) ? t.technologies : (typeof t.technologies === 'string' ? JSON.parse(t.technologies || '[]') : []);
          const findings = t.findings_count || t.finding_count || 0;
          const subdomains = t.subdomain_count || t.subdomains || 0;
          return html`
            <div class="glass-card target-card" key=${t.id || i}>
              <div class="target-domain">
                <span class="status-dot" style="background:${t.status==='active'?'var(--success)':'var(--text-muted)'}"></span>
                ${domain}
              </div>
              <div class="target-meta">
                <span>Findings: ${findings}</span>
                <span>Subdomains: ${subdomains}</span>
                ${t.ip ? html`<span>IP: ${t.ip}</span>` : null}
              </div>
              <div class="target-techs">
                ${techs.slice(0, 8).map(tech => html`<span class="tech-tag" key=${tech}>${tech}</span>`)}
                ${techs.length > 8 ? html`<span class="tech-tag">+${techs.length - 8}</span>` : null}
              </div>
            </div>
          `;
        })}
      </div>
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════════
   Tab: Insights (Attack stats, Kill Chain, ReACT traces)
   ══════════════════════════════════════════════════════════════ */
function InsightsTab({ state }) {
  const [attackStats, setAttackStats] = useState(null);
  const [killChain, setKillChain] = useState(null);
  const [traces, setTraces] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([
      api('/api/attacks/stats'),
      api('/api/attacks/kill-chain'),
      api('/api/react/traces'),
    ]).then(([stats, kc, tr]) => {
      setAttackStats(stats);
      setKillChain(kc);
      setTraces(Array.isArray(tr) ? tr : (tr?.traces || []));
      setLoading(false);
    });
  }, []);

  if (loading) return html`<div class="loading-spinner"><div class="spinner"></div> Loading insights...</div>`;

  return html`
    <div class="animate-in insights-list">
      <!-- Attack Stats -->
      ${attackStats ? html`
        <div class="glass-card insight-card">
          <h3>Attack Statistics</h3>
          <div class="kpi-grid" style="margin-top:12px">
            ${KpiCard({ label: 'Total Attacks', value: attackStats.total || attackStats.total_attacks || 0, color: 'var(--accent-light)', accent: 'var(--accent)' })}
            ${KpiCard({ label: 'Successful', value: attackStats.successful || attackStats.success || 0, color: 'var(--success)', accent: 'var(--success)' })}
            ${KpiCard({ label: 'Failed', value: attackStats.failed || attackStats.failure || 0, color: 'var(--danger)', accent: 'var(--danger)' })}
            ${KpiCard({ label: 'Success Rate', value: (attackStats.success_rate || attackStats.win_rate || 0) + '%', color: 'var(--neon-cyan)', accent: 'var(--neon-cyan)' })}
          </div>
        </div>
      ` : null}

      <!-- Kill Chain -->
      ${killChain ? html`
        <div class="glass-card insight-card">
          <h3>Kill Chain Progression</h3>
          <div style="margin-top:12px">
            ${(killChain.stages || killChain.chain || Object.entries(killChain).filter(([k]) => typeof killChain[k] === 'number')).map((item, i) => {
              const name = Array.isArray(item) ? item[0] : (item.name || item.stage || `Stage ${i+1}`);
              const count = Array.isArray(item) ? item[1] : (item.count || item.value || 0);
              const max = Math.max(...(Array.isArray(killChain.stages || killChain.chain) ? (killChain.stages || killChain.chain) : Object.entries(killChain).filter(([k]) => typeof killChain[k] === 'number')).map(x => Array.isArray(x) ? x[1] : (x.count || x.value || 0)), 1);
              const pct = Math.round((count / max) * 100);
              return html`
                <div key=${i} style="margin-bottom:10px">
                  <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
                    <span style="font-weight:600">${name}</span>
                    <span style="color:var(--text-muted)">${count}</span>
                  </div>
                  <div style="height:6px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden">
                    <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--neon-cyan));border-radius:3px;transition:width 0.5s"></div>
                  </div>
                </div>
              `;
            })}
          </div>
        </div>
      ` : null}

      <!-- ReACT Traces -->
      <div class="glass-card insight-card">
        <h3>ReACT Reasoning Traces</h3>
        ${traces.length === 0 ? html`<p style="color:var(--text-muted);font-size:13px;margin-top:8px">No reasoning traces available</p>` : null}
        ${traces.slice(0, 10).map((trace, i) => html`
          <div key=${i} style="padding:12px 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px">
              <span style="font-weight:600;font-size:13px">${trace.thought || trace.action || trace.title || `Trace #${i+1}`}</span>
              <span style="font-size:11px;color:var(--text-muted)">${trace.timestamp ? new Date(trace.timestamp).toLocaleTimeString() : ''}</span>
            </div>
            ${trace.observation ? html`<p style="font-size:12px;color:var(--text-secondary)">${trace.observation}</p>` : null}
            ${trace.result ? html`<div class="code-block" style="margin-top:6px;font-size:11px">${typeof trace.result === 'string' ? trace.result : JSON.stringify(trace.result, null, 2)}</div>` : null}
          </div>
        `)}
      </div>
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════════
   Tab: Terminal
   ══════════════════════════════════════════════════════════════ */
function TerminalTab({ state }) {
  const [input, setInput] = useState('');
  const [lines, setLines] = useState(state.terminalLines || []);
  const termRef = useRef(null);

  useEffect(() => {
    setLines(state.terminalLines || []);
  }, [state.terminalLines]);

  useEffect(() => {
    if (termRef.current) termRef.current.scrollTop = termRef.current.scrollHeight;
  }, [lines]);

  const submit = async () => {
    if (!input.trim()) return;
    const cmd = input;
    const newLine = { type: 'cmd', text: `$ ${cmd}`, time: new Date() };
    const updated = [...lines, newLine];
    setLines(updated);
    store.setState({ terminalLines: updated });
    setInput('');
    try {
      const resp = await fetch('/api/terminal/execute', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: cmd })
      });
      const data = await resp.json();
      const output = data.output || '';
      const outLines = output.split('\\n').filter(l => l).map(l => ({ type: data.exit_code === 0 ? 'info' : 'error', text: l, time: new Date() }));
      const all = [...updated, ...outLines];
      setLines(all);
      store.setState({ terminalLines: all });
    } catch(e) {
      const errLine = { type: 'error', text: 'Error: ' + e.message, time: new Date() };
      setLines([...updated, errLine]);
    }
  };

  return html`
    <div class="animate-in">
      <div class="terminal-container" ref=${termRef}>
        <div class="term-line info">VIPER 5.0 Terminal</div>
        <div class="term-line info">Type commands or guidance for the agent</div>
        <div class="term-line" style="color:var(--border)">${'─'.repeat(60)}</div>
        ${lines.map((l, i) => html`
          <div class="term-line ${l.type}" key=${i}>${l.text}</div>
        `)}
        <div class="term-prompt">
          <span class="term-prompt-symbol">$</span>
          <input class="term-input" placeholder="Enter command..."
                 value=${input}
                 oninput=${e => setInput(e.target.value)}
                 onkeydown=${e => { if(e.key==='Enter') submit(); }} />
        </div>
      </div>
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════════
   Tab: Chat
   ══════════════════════════════════════════════════════════════ */
function ChatTab({ state }) {
  const [messages, setMessages] = useState(state.chatMessages || []);
  const [input, setInput] = useState('');
  const msgsRef = useRef(null);

  useEffect(() => {
    if (msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight;
  }, [messages]);

  const send = async () => {
    if (!input.trim()) return;
    const msg = input;
    const updated = [...messages, { role: 'user', text: msg, time: new Date() }];
    setMessages(updated);
    store.setState({ chatMessages: updated });
    setInput('');
    const thinking = [...updated, { role: 'assistant', text: '⏳ Thinking...', time: new Date() }];
    setMessages(thinking);
    try {
      const resp = await fetch('/api/chat/send', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });
      const data = await resp.json();
      const reply = data.response || data.message || 'No response';
      const withReply = [...updated, { role: 'assistant', text: reply, time: new Date() }];
      setMessages(withReply);
      store.setState({ chatMessages: withReply });
    } catch(e) {
      const withErr = [...updated, { role: 'assistant', text: 'Error: ' + e.message, time: new Date() }];
      setMessages(withErr);
    }
  };

  return html`
    <div class="chat-container animate-in">
      <div class="chat-messages" ref=${msgsRef}>
        ${messages.length === 0 ? html`
          <div style="text-align:center;color:var(--text-muted);padding:40px;font-size:13px">
            <p style="font-size:16px;margin-bottom:8px">Chat with VIPER Agent</p>
            <p>Send guidance, questions, or commands</p>
          </div>
        ` : null}
        ${messages.map((m, i) => html`
          <div class="chat-msg ${m.role}" key=${i}>
            ${m.role === 'assistant' ? unsafeHTML(marked.parse(m.text || '')) : m.text}
          </div>
        `)}
      </div>
      <div class="chat-input-area">
        <input class="chat-input" placeholder="Send a message..."
               value=${input}
               oninput=${e => setInput(e.target.value)}
               onkeydown=${e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }}} />
        <button class="chat-send" onclick=${send}>Send</button>
      </div>
    </div>
  `;
}

// Simple unsafeHTML helper for marked output
function unsafeHTML(htmlStr) {
  return h('span', { dangerouslySetInnerHTML: { __html: htmlStr } });
}

/* ══════════════════════════════════════════════════════════════
   Tab: CypherFix
   ══════════════════════════════════════════════════════════════ */
function CypherFixTab({ state }) {
  const [fixes, setFixes] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    api('/api/codefix/status').then(data => {
      if (data && Array.isArray(data.fixes)) setFixes(data.fixes);
      else if (Array.isArray(data)) setFixes(data);
      setLoading(false);
    });
  }, []);

  if (loading) return html`<div class="loading-spinner"><div class="spinner"></div> Loading fixes...</div>`;

  return html`
    <div class="cypher-container animate-in">
      ${fixes.length === 0 ? html`
        <div class="empty-state">
          <h3>No Code Fixes</h3>
          <p>CypherFix generates remediation code for validated findings</p>
        </div>
      ` : null}
      ${fixes.map((fix, i) => html`
        <div class="glass-card cypher-card" key=${i}>
          <div class="title">
            <span class="sev-badge sev-${(fix.severity||'info').toLowerCase()}">${fix.severity || 'info'}</span>
            ${fix.title || fix.finding || `Fix #${i+1}`}
          </div>
          ${fix.description ? html`<p style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">${fix.description}</p>` : null}
          ${fix.code ? html`<div class="code-block">${fix.code}</div>` : null}
          ${fix.diff ? html`<div class="code-block" style="color:var(--neon-green)">${fix.diff}</div>` : null}
        </div>
      `)}
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════════
   Tab: Settings
