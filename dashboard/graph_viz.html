<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIPER 4.0 — Attack Graph</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/force-graph@1.43.4/dist/force-graph.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.73.3/dist/3d-force-graph.min.js" onerror="window._no3d=true"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #1c2333;
  --text: #c9d1d9; --text2: #8b949e; --muted: #6e7681;
  --border: rgba(48,54,61,0.6); --accent: #6366f1; --accent2: #818cf8;
  --critical: #ff4444; --high: #ff8c00; --medium: #ffd700;
  --low: #4da6ff; --success: #00c853;
  --font: 'Inter', system-ui, sans-serif; --mono: 'JetBrains Mono', monospace;
}
body { background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

/* ── Nav ── */
.nav { display: flex; align-items: center; gap: 8px; padding: 8px 16px;
  background: var(--bg2); border-bottom: 1px solid var(--border); height: 48px; z-index: 100; }
.nav a { color: var(--text2); text-decoration: none; font-size: 13px; padding: 4px 10px;
  border-radius: 6px; transition: all .2s; }
.nav a:hover, .nav a.active { color: var(--text); background: rgba(99,102,241,.12); }
.nav .brand { color: var(--accent2); font-weight: 700; font-size: 15px; margin-right: 12px; }

/* ── Toolbar ── */
.toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 16px;
  background: var(--bg2); border-bottom: 1px solid var(--border); }
.toolbar input, .toolbar select { background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 13px; outline: none; }
.toolbar input:focus { border-color: var(--accent); }
.toolbar button { background: var(--accent); color: #fff; border: none; padding: 6px 14px;
  border-radius: 6px; font-size: 13px; cursor: pointer; transition: .2s; }
.toolbar button:hover { filter: brightness(1.15); }
.toolbar button.outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.toolbar button.outline:hover { border-color: var(--accent); color: var(--text); }
.toolbar .spacer { flex: 1; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px;
  font-weight: 600; background: var(--accent); color: #fff; }

/* ── Graph container ── */
#graph-container { width: 100vw; height: calc(100vh - 96px); position: relative; }

/* ── Detail panel ── */
.detail-panel { position: absolute; top: 12px; right: 12px; width: 320px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; display: none; z-index: 50; max-height: calc(100vh - 140px);
  overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
.detail-panel.open { display: block; }
.detail-panel h3 { font-size: 14px; color: var(--accent2); margin-bottom: 8px; }
.detail-panel .close { position: absolute; top: 8px; right: 12px; cursor: pointer;
  color: var(--text2); font-size: 18px; background: none; border: none; }
.detail-panel .field { margin-bottom: 6px; font-size: 12px; }
.detail-panel .field .label { color: var(--text2); margin-right: 4px; }
.detail-panel .field .value { color: var(--text); font-family: var(--mono); }

/* ── Legend ── */
.legend { position: absolute; bottom: 16px; left: 16px; background: rgba(22,27,34,.9);
  border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; z-index: 50; }
.legend h4 { font-size: 11px; color: var(--text2); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 8px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 12px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ── Stats bar ── */
.stats-bar { position: absolute; top: 12px; left: 12px; display: flex; gap: 8px; z-index: 50; }
.stat-chip { background: rgba(22,27,34,.9); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 12px; font-size: 12px; }
.stat-chip .num { font-weight: 700; color: var(--accent2); }
</style>
</head>
<body>

<nav class="nav">
  <span class="brand">VIPER 4.0</span>
  <a href="index.html">Dashboard</a>
  <a href="graph_viz.html" class="active">Graph</a>
  <a href="charts.html">Analytics</a>
  <a href="chat.html">Chat</a>
  <a href="terminal.html">Terminal</a>
  <a href="settings_ui.html">Settings</a>
</nav>

<div class="toolbar">
  <input type="text" id="search-input" placeholder="Search nodes..." style="width:220px">
  <select id="type-filter">
    <option value="">All Types</option>
  </select>
  <button class="outline" id="btn-reset">Reset View</button>
  <button class="outline" id="btn-toggle-dim">Toggle 2D/3D</button>
  <div class="spacer"></div>
  <button id="btn-zoom-in" class="outline" title="Zoom In">+</button>
  <button id="btn-zoom-out" class="outline" title="Zoom Out">-</button>
  <button id="btn-fit" class="outline">Fit</button>
  <button id="btn-refresh">Refresh</button>
</div>

<div id="graph-container"></div>

<!-- Detail Panel -->
<div class="detail-panel" id="detail-panel">
  <button class="close" id="detail-close">&times;</button>
  <h3 id="detail-title">Node Details</h3>
  <div id="detail-body"></div>
</div>

<!-- Legend -->
<div class="legend" id="legend"></div>

<!-- Stats -->
<div class="stats-bar" id="stats-bar"></div>

<script>
const NODE_COLORS = {
  target:       { bg: "#4da6ff", border: "#3b82f6" },
  subdomain:    { bg: "#818cf8", border: "#6366f1" },
  ip:           { bg: "#a78bfa", border: "#7c3aed" },
  port:         { bg: "#c084fc", border: "#9333ea" },
  service:      { bg: "#e879f9", border: "#c026d3" },
  technology:   { bg: "#00c853", border: "#16a34a" },
  vulnerability:{ bg: "#ff4444", border: "#dc2626" },
  cve:          { bg: "#ff6b6b", border: "#ef4444" },
  finding:      { bg: "#ff4444", border: "#dc2626" },
  endpoint:     { bg: "#38bdf8", border: "#0ea5e9" },
  parameter:    { bg: "#67e8f9", border: "#22d3ee" },
  certificate:  { bg: "#a3e635", border: "#84cc16" },
  secret:       { bg: "#fbbf24", border: "#f59e0b" },
  attack:       { bg: "#ff8c00", border: "#ea580c" },
  attack_chain: { bg: "#f472b6", border: "#ec4899" },
  base_url:     { bg: "#60a5fa", border: "#3b82f6" },
};
const DEFAULT_COLOR = { bg: "#6e7681", border: "#484f58" };

let graphInstance = null;
let is3D = false;
let graphData = { nodes: [], links: [] };

function getColor(type) {
  const t = (type || "").toLowerCase().replace(/ /g, "_");
  return NODE_COLORS[t] || DEFAULT_COLOR;
}

function nodeSize(node) {
  const base = 4;
  const degree = (node.neighbors || []).length || 1;
  const severityBonus = node.severity === "critical" ? 6 : node.severity === "high" ? 4 : 0;
  return base + Math.min(degree * 1.5, 12) + severityBonus;
}

async function fetchGraph() {
  try {
    // Try multiple endpoints
    let data;
    for (const url of ["/api/evograph/graph", "/api/attack-graph", "/api/graph"]) {
      try {
        const r = await fetch(url);
        if (r.ok) { data = await r.json(); break; }
      } catch(e) {}
    }
    if (!data) return;

    // Normalize to force-graph format: { nodes: [{id}], links: [{source, target}] }
    const nodes = (data.nodes || []).map(n => ({
      id: n.id,
      label: n.label || n.name || n.id,
      type: (n.node_type || n.group || n.type || "unknown").toLowerCase(),
      severity: n.severity || "",
      data: n,
      neighbors: [],
      links: [],
    }));

    const nodeMap = new Map(nodes.map(n => [n.id, n]));
    const links = (data.edges || data.links || []).map(e => ({
      source: e.from || e.source,
      target: e.to || e.target,
      label: e.title || e.rel || e.label || "",
    })).filter(l => nodeMap.has(l.source) && nodeMap.has(l.target));

    // Build neighbor lists
    links.forEach(l => {
      const src = nodeMap.get(l.source);
      const tgt = nodeMap.get(l.target);
      if (src && tgt) {
        src.neighbors.push(tgt);
        tgt.neighbors.push(src);
        src.links.push(l);
        tgt.links.push(l);
      }
    });

    graphData = { nodes, links };
    return graphData;
  } catch (e) {
    console.error("Failed to fetch graph:", e);
  }
}

function buildLegend() {
  const types = new Set(graphData.nodes.map(n => n.type));
  const legend = document.getElementById("legend");
  let html = "<h4>Node Types</h4>";
  [...types].sort().forEach(t => {
    const c = getColor(t);
    html += `<div class="legend-item"><span class="legend-dot" style="background:${c.bg}"></span>${t}</div>`;
  });
  legend.innerHTML = html;
}

function buildTypeFilter() {
  const types = new Set(graphData.nodes.map(n => n.type));
  const sel = document.getElementById("type-filter");
  sel.innerHTML = '<option value="">All Types</option>';
  [...types].sort().forEach(t => {
    sel.innerHTML += `<option value="${t}">${t} (${graphData.nodes.filter(n=>n.type===t).length})</option>`;
  });
}

function updateStats() {
  const bar = document.getElementById("stats-bar");
  bar.innerHTML = `
    <div class="stat-chip"><span class="num">${graphData.nodes.length}</span> nodes</div>
    <div class="stat-chip"><span class="num">${graphData.links.length}</span> edges</div>
    <div class="stat-chip"><span class="num">${new Set(graphData.nodes.map(n=>n.type)).size}</span> types</div>
  `;
}

function showDetail(node) {
  const panel = document.getElementById("detail-panel");
  const title = document.getElementById("detail-title");
  const body = document.getElementById("detail-body");

  title.textContent = node.label || node.id;
  let html = `
    <div class="field"><span class="label">Type:</span>
      <span class="value" style="color:${getColor(node.type).bg}">${node.type}</span></div>
    <div class="field"><span class="label">ID:</span><span class="value">${node.id}</span></div>
  `;
  if (node.severity) {
    html += `<div class="field"><span class="label">Severity:</span><span class="value">${node.severity}</span></div>`;
  }
  html += `<div class="field"><span class="label">Connections:</span><span class="value">${(node.neighbors||[]).length}</span></div>`;

  // Show extra data fields
  const d = node.data || {};
  const skip = new Set(["id","label","name","node_type","group","type","color","shape","size","x","y","vx","vy","fx","fy","index","__indexColor"]);
  Object.keys(d).filter(k => !skip.has(k) && d[k] != null && d[k] !== "").forEach(k => {
    const val = typeof d[k] === "object" ? JSON.stringify(d[k]) : String(d[k]);
    if (val.length < 200) {
      html += `<div class="field"><span class="label">${k}:</span><span class="value">${val}</span></div>`;
    }
  });

  // Connected nodes
  if (node.neighbors && node.neighbors.length > 0) {
    html += `<h3 style="margin-top:12px">Connected (${node.neighbors.length})</h3>`;
    node.neighbors.slice(0, 20).forEach(n => {
      const c = getColor(n.type);
      html += `<div class="field"><span class="legend-dot" style="background:${c.bg};width:8px;height:8px;display:inline-block;border-radius:50%;margin-right:4px"></span>
        <span class="value">${n.label}</span> <span class="label">(${n.type})</span></div>`;
    });
    if (node.neighbors.length > 20) html += `<div class="field muted">...and ${node.neighbors.length-20} more</div>`;
  }

  body.innerHTML = html;
  panel.classList.add("open");
}

function renderGraph(mode3d) {
  const container = document.getElementById("graph-container");
  container.innerHTML = "";

  if (mode3d && !window._no3d && typeof ForceGraph3D !== "undefined") {
    graphInstance = ForceGraph3D()(container)
      .graphData(graphData)
      .nodeLabel(n => `${n.label} (${n.type})`)
      .nodeColor(n => getColor(n.type).bg)
      .nodeVal(n => nodeSize(n))
      .linkColor(() => "rgba(255,255,255,0.15)")
      .linkDirectionalArrowLength(3)
      .linkDirectionalArrowRelPos(1)
      .backgroundColor("#0d1117")
      .onNodeClick(n => showDetail(n));
  } else {
    graphInstance = ForceGraph()(container)
      .graphData(graphData)
      .nodeLabel(n => `${n.label} (${n.type})`)
      .nodeColor(n => getColor(n.type).bg)
      .nodeVal(n => nodeSize(n))
      .nodeCanvasObject((node, ctx, globalScale) => {
        const size = nodeSize(node);
        const c = getColor(node.type);
        // Glow
        ctx.beginPath();
        ctx.arc(node.x, node.y, size + 2, 0, 2 * Math.PI);
        ctx.fillStyle = c.bg + "33";
        ctx.fill();
        // Node
        ctx.beginPath();
        ctx.arc(node.x, node.y, size, 0, 2 * Math.PI);
        ctx.fillStyle = c.bg;
        ctx.strokeStyle = c.border;
        ctx.lineWidth = 1.5;
        ctx.fill();
        ctx.stroke();
        // Label (only at zoom)
        if (globalScale > 1.5) {
          ctx.font = `${Math.max(10/globalScale, 3)}px Inter, sans-serif`;
          ctx.fillStyle = "#c9d1d9";
          ctx.textAlign = "center";
          ctx.fillText(node.label, node.x, node.y + size + 8/globalScale);
        }
      })
      .nodePointerAreaPaint((node, color, ctx) => {
        const size = nodeSize(node) + 4;
        ctx.beginPath();
        ctx.arc(node.x, node.y, size, 0, 2*Math.PI);
        ctx.fillStyle = color;
        ctx.fill();
      })
      .linkColor(() => "rgba(255,255,255,0.08)")
      .linkDirectionalArrowLength(4)
      .linkDirectionalArrowRelPos(1)
      .linkWidth(0.5)
      .backgroundColor("#0d1117")
      .onNodeClick(n => showDetail(n))
      .cooldownTicks(100);
  }
}

function applyFilter() {
  const search = document.getElementById("search-input").value.toLowerCase();
  const typeFilter = document.getElementById("type-filter").value;

  if (!search && !typeFilter) {
    graphInstance.graphData(graphData);
    return;
  }

  const filteredNodes = graphData.nodes.filter(n => {
    const matchType = !typeFilter || n.type === typeFilter;
    const matchSearch = !search || n.label.toLowerCase().includes(search) || n.id.toLowerCase().includes(search);
    return matchType && matchSearch;
  });
  const nodeIds = new Set(filteredNodes.map(n => n.id));
  // Also include neighbors of matched nodes
  filteredNodes.forEach(n => (n.neighbors||[]).forEach(nb => nodeIds.add(nb.id)));
  const allNodes = graphData.nodes.filter(n => nodeIds.has(n.id));
  const allLinks = graphData.links.filter(l => {
    const src = typeof l.source === "object" ? l.source.id : l.source;
    const tgt = typeof l.target === "object" ? l.target.id : l.target;
    return nodeIds.has(src) && nodeIds.has(tgt);
  });

  graphInstance.graphData({ nodes: allNodes, links: allLinks });
}

// ── Events ──
document.getElementById("search-input").addEventListener("input", () => setTimeout(applyFilter, 300));
document.getElementById("type-filter").addEventListener("change", applyFilter);
document.getElementById("btn-reset").addEventListener("click", () => {
  document.getElementById("search-input").value = "";
  document.getElementById("type-filter").value = "";
  graphInstance.graphData(graphData);
  graphInstance.zoomToFit(400);
});
document.getElementById("btn-toggle-dim").addEventListener("click", () => {
  is3D = !is3D;
  renderGraph(is3D);
});
document.getElementById("btn-zoom-in").addEventListener("click", () => {
  if (graphInstance.zoom) graphInstance.zoom(graphInstance.zoom() * 1.3, 300);
});
document.getElementById("btn-zoom-out").addEventListener("click", () => {
  if (graphInstance.zoom) graphInstance.zoom(graphInstance.zoom() * 0.7, 300);
});
document.getElementById("btn-fit").addEventListener("click", () => {
  if (graphInstance.zoomToFit) graphInstance.zoomToFit(400);
});
document.getElementById("btn-refresh").addEventListener("click", async () => {
  await fetchGraph();
  renderGraph(is3D);
  buildLegend();
  buildTypeFilter();
  updateStats();
});
document.getElementById("detail-close").addEventListener("click", () => {
  document.getElementById("detail-panel").classList.remove("open");
});

// ── Init ──
(async () => {
  await fetchGraph();
  renderGraph(false);
  buildLegend();
  buildTypeFilter();
  updateStats();
})();
</script>
</body>
</html>
